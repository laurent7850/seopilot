services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seopilot-web
    restart: always
    environment:
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=postgresql://seopilot:${DB_PASSWORD}@seopilot-postgres:5432/seopilot
      - REDIS_URL=redis://seopilot-redis:6379
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - NEXT_PUBLIC_APP_NAME=${NEXT_PUBLIC_APP_NAME:-SEOPilot}
      - NEXT_PUBLIC_APP_URL=${NEXTAUTH_URL}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@seopilot.fr}
      - NODE_ENV=production
      - PORT=3000
    labels:
      - traefik.enable=true
      - traefik.http.routers.seopilot.rule=Host(`seopilot.srv767464.hstgr.cloud`)
      - traefik.http.routers.seopilot.entrypoints=websecure
      - traefik.http.routers.seopilot.tls.certresolver=letsencrypt
      - traefik.http.services.seopilot.loadbalancer.server.port=3000
      - traefik.docker.network=root_default
    depends_on:
      seopilot-postgres:
        condition: service_healthy
      seopilot-redis:
        condition: service_healthy
    networks:
      - root_default
      - seopilot_default

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seopilot-worker
    restart: always
    command: ["npx", "tsx", "src/workers/index.ts"]
    labels:
      - traefik.enable=false
    environment:
      - DATABASE_URL=postgresql://seopilot:${DB_PASSWORD}@seopilot-postgres:5432/seopilot
      - REDIS_URL=redis://seopilot-redis:6379
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      seopilot-postgres:
        condition: service_healthy
      seopilot-redis:
        condition: service_healthy
    networks:
      - seopilot_default

  seopilot-postgres:
    image: postgres:16-alpine
    container_name: seopilot-postgres
    restart: always
    environment:
      POSTGRES_USER: seopilot
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: seopilot
    volumes:
      - seopilot_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seopilot"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - seopilot_default

  seopilot-redis:
    image: redis:7-alpine
    container_name: seopilot-redis
    restart: always
    volumes:
      - seopilot_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - seopilot_default

volumes:
  seopilot_postgres_data:
  seopilot_redis_data:

networks:
  root_default:
    external: true
  seopilot_default:
